{% extends 'base.html' %}
{% block title %}Change Password – FitAct{% endblock %}
{% block content %}
<div class="page-content" style="max-width:480px;">

    <div style="margin-bottom:24px;">
        <a href="{{ url_for('main.account') }}" class="btn-back">Back</a>
    </div>

    <h1 class="page-title">Change Password</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for c, m in messages %}
            <div class="fitact-alert fitact-alert-{{ c }}">{{ m }}</div>
        {% endfor %}{% endif %}
    {% endwith %}

    <div style="background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg);
                padding:28px 32px; box-shadow:var(--shadow-sm); margin-top:24px;">
        <form method="POST" action="{{ url_for('main.change_password') }}">
            <label class="account-field-label" style="margin-bottom:6px;">Current password</label>
            <input type="password" name="old_password" class="fitact-input"
                   style="margin:0 0 20px 0; max-width:100%; text-align:left; padding-left:16px;"
                   placeholder="Enter current password" required>

            <label class="account-field-label" style="margin-bottom:6px;">New password</label>
            <input type="password" name="new_password" class="fitact-input"
                   style="margin:0 0 20px 0; max-width:100%; text-align:left; padding-left:16px;"
                   placeholder="At least 6 characters" required>

            <label class="account-field-label" style="margin-bottom:6px;">Confirm new password</label>
            <input type="password" name="confirm_password" class="fitact-input"
                   style="margin:0 0 28px 0; max-width:100%; text-align:left; padding-left:16px;"
                   placeholder="Repeat new password" required>

            <button type="submit" class="btn-fitact">Update password</button>
        </form>
    </div>

</div>
{% endblock %}
