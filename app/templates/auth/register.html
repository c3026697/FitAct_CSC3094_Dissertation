<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – FitAct</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:var(--bg); min-height:100vh; display:flex; flex-direction:column;">

<nav class="auth-nav">
    <a href="{{ url_for('auth.login') }}" class="btn-auth-pill">Login</a>
    <div></div>
    <a href="{{ url_for('auth.register') }}" class="btn-auth-pill">Sign up</a>
</nav>

<div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div style="width:100%; max-width:420px;">

        <div class="logo-block" style="margin-bottom:40px;">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="FitAct logo" style="width:100px; height:auto;">
            <h1 class="logo-text">FitAct</h1>
            <p class="logo-slogan">From Fitness Awareness to Action</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="fitact-alert fitact-alert-{{ category }}" style="margin-bottom:16px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div style="background:var(--white); border:1px solid var(--border);
                    border-radius:20px; padding:32px; box-shadow:var(--shadow-md);">
            <h2 style="font-size:1.2rem; font-weight:700; color:var(--dark-blue);
                        margin-bottom:24px; text-align:center;">Create your account</h2>

            <form method="POST" action="{{ url_for('auth.register') }}">
                <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Username</label>
                <input type="text" name="username" class="fitact-input" style="margin:0 0 16px 0; max-width:100%;" placeholder="Choose a username" required>

                <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Email</label>
                <input type="email" name="email" class="fitact-input" style="margin:0 0 16px 0; max-width:100%;" placeholder="you@example.com" required>

                <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Password</label>
                <input type="password" name="password" class="fitact-input" style="margin:0 0 16px 0; max-width:100%;" placeholder="At least 6 characters" required>

                <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Confirm password</label>
                <input type="password" name="confirm_password" class="fitact-input" style="margin:0 0 24px 0; max-width:100%;" placeholder="Repeat password" required>

                <button type="submit" class="btn-fitact">Create account</button>
            </form>
        </div>

        <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--muted);">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="color:var(--blue); font-weight:600; text-decoration:none;">Login</a>
        </p>
    </div>
</div>
</body>
</html>
