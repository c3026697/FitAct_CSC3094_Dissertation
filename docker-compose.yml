services:

  # ── Nginx reverse proxy / load balancer (NFR7) ───────────────────────────
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # ── FitAct application (pulled from GHCR) ────────────────────────────────
  app:
    image: ghcr.io/c3026697/fitact_csc3094_dissertation/fitact:2a4df3bc9bc00a1c61fdc852c7397b1ceb1dc636
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}